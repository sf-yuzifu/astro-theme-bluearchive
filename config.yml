# ============================================
# 站点全局配置文件
# ============================================

# 站点基本信息
site:
  title: "Astro Blog"
  description: "Welcome to my website!"
  author: "Your Name"
  avatar: "/theme/banner/avatar.webp"
  favicon: "/favicon.svg"
  # 站点 URL，用于 RSS 和 SEO
  url: "https://example.com"
  # 语言设置
  lang: "zh-CN"
  # 备案号（可选）
  # 支持单个字符串或数组格式
  # icp: "萌ICP备114514号"
  # 或带自定义链接：
  icp:
    - text: "萌ICP备114514号"
      url: "https://icp.gov.moe/"
    # 可以添加多个备案号
    # - text: "京ICP备12345678号"
    #   url: "https://beian.miit.gov.cn/"
  # 社交链接（用于首页欢迎框）
  # 使用 Font Awesome 品牌图标名称（不含 fa-brands: 前缀）
  social:
    - icon: "github"
      url: "https://github.com/withastro/astro"
    - icon: "twitter"
      url: "https://twitter.com/astrodotbuild"
    - icon: "qq"
      url: "https://qq.qq.com/"
    # 其他常用图标：discord, youtube, bilibili, weixin, qq, telegram, instagram, etc.

# 导航菜单
nav:
  - name: "首页"
    url: "/"
  - name: "标签"
    url: "/tags/"
  - name: "项目"
    url: "/project/"
  - name: "追番"
    url: "/bangumi/"
  - name: "友链"
    url: "/friends/"
  - name: "关于"
    url: "/about/"

# 友链配置
friends:
  enable: true
  title: "友情链接"
  description: "与优秀的开发者们互相连接"
  list:
    - name: "Astro"
      url: "https://astro.build"
      description: "The web framework for content-driven websites"
      avatar: "https://astro.build/favicon.svg"
    - name: "Example Blog"
      url: "https://example.com"
      description: "An example blog for demonstration"

# 项目展示配置
projects:
  enable: true
  title: "我的项目"
  description: "开源作品与个人项目展示"
  list:
    - name: "Astro Blog"
      url: "https://github.com/withastro/astro"
      description: "使用 Astro 构建的个人博客网站，支持 Markdown 和 MDX"
      tags: ["Astro", "TypeScript", "Less"]
      icon: "ph:rocket-launch-bold"
    - name: "Example Project"
      url: "https://example.com"
      description: "一个示例项目用于演示"
      tags: ["React", "Node.js"]
      icon: "ph:code-bold"

# 评论系统配置
comments:
  enable: true
  # 支持: waline
  type: "waline"
  waline:
    serverURL: "https://your-waline-server.vercel.app"
    # 必填，Waline 的服务端地址
    # 其他可选配置
    # placeholder: "欢迎评论..."
    # dark: 'html[theme="dark"]'

# 捐赠/赞助配置
sponsor:
  enable: true
  title: "喜欢这篇文章？打赏一下作者吧"
  description: "如果我的文章对你有帮助，欢迎赞赏支持"
  methods:
    - name: "微信"
      image: "/donate/donate.png"
      icon: "ph:wechat-logo-bold"
      color: "#07c160"
    - name: "支付宝"
      image: "/donate/donate.png"
      icon: "ph:wallet-bold"
      color: "#1677ff"
    - name: "爱发电"
      url: "https://afdian.net/"
      icon: "ph:lightning-bold"
      color: "#946ce6"

# 页脚配置
footer:
  # 页脚链接
  links:
    - name: "Astro"
      url: "https://astro.build/"
    - name: "AronaNote"
      url: "https://github.com/sf-yuzifu/astro-theme-AronaNote"

# SEO 相关
seo:
  # 默认 OG 图片
  ogImage: "/blog-placeholder-about.jpg"
  # 关键词
  keywords: ["blog", "astro", "个人博客"]
  # Twitter 账号（可选）
  # twitter: "@yourname"

# 功能开关
features:
  # 搜索功能
  search: true
  # 返回顶部
  backToTop: true
  # 主题切换
  themeToggle: true
  # 页面过渡动画
  pageTransition: true
  # 阅读时间估算
  readingTime: true
  # 背景音乐
  music: true

# Spine Live2D 配置
spine:
  # 是否启用 Spine Live2D
  enable: true
  # 语音语言: zh (中文) 或 jp (日语)
  voiceLang: "zh"
  # 角色配置，这里亮色就使用 arona，暗色就使用 plana
  characters:
    arona:
      # 资源路径
      skelUrl: "/spine_assets/aris/aris_noweapon_spr.skel"
      atlasUrl: "/spine_assets/aris/aris_noweapon_spr.atlas"
      # 动画名称
      idleAnimationName: "Idle_01"
      eyeCloseAnimationName: "Eye_Close_01"
      # 骨骼名称（只有 arona、plana 有）
      rightEyeBone: "R_Eye_01"
      leftEyeBone: "L_Eye_01"
      frontHeadBone: "Head_01"
      backHeadBone: "Head_Back"
      # 眼睛旋转角度（只有 arona、plana 有）
      eyeRotationAngle: 76.307
      # 语音配置列表
      voiceConfig:
        - audio: "/spine_assets/aris/audio/aris_01.ogg"
          animation: "10"
          text: "唔——肚子饿了。\n咦……？ \n爱丽丝不吃电池的！"
        - audio: "/spine_assets/aris/audio/aris_02.ogg"
          animation: "00"
          text: "勇者啊，愿光与你同在。"
        - audio: "/spine_assets/aris/audio/aris_03.ogg"
          animation: "07"
          text: "爱丽丝也想要提升老师的好感度。"
        - audio: "/spine_assets/aris/audio/aris_04.ogg"
          animation: "05"
          text: "以这不可动摇的意志……光啊！"
        - audio: "/spine_assets/aris/audio/aris_05.ogg"
          animation: "04"
          text: "老师？怎么了？"
      # 复制事件配置（可选，不配置则禁用）
      copyConfig:
        audio: "/spine_assets/aris/audio/aris_copy.mp3" # 可选，不配置则无音频
        animation: "07"
        text: "邦邦咔邦！复制了有用的知识呢！"
      # 位置偏移配置（可选，不配置则使用默认位置）
      offset:
        left: "0" # 水平位置偏移，支持 % 或 px
      #   bottom: "20px"  # 垂直位置偏移，支持 % 或 px
    plana:
      # 资源路径
      skelUrl: "/spine_assets/kei/CH0335_noweapon_spr.skel"
      atlasUrl: "/spine_assets/kei/CH0335_noweapon_spr.atlas"
      # 动画名称
      idleAnimationName: "Idle_01"
      eyeCloseAnimationName: "Eye_Close_01"
      # 骨骼名称（只有 arona、plana 有）
      rightEyeBone: "R_Eye_01"
      leftEyeBone: "L_Eye_01"
      frontHeadBone: "Head_Rot"
      backHeadBone: "Head_Back"
      # 眼睛旋转角度（只有 arona、plana 有）
      eyeRotationAngle: 97.331
      # 语音配置列表
      voiceConfig:
        - audio: "/spine_assets/kei/audio/kei_01.ogg"
          animation: "17"
          text: "请别说我可爱啦！"
        - audio: "/spine_assets/kei/audio/kei_02.ogg"
          animation: "29"
          text: "……我还没幼稚到那种地步。"
        - audio: "/spine_assets/kei/audio/kei_03.ogg"
          animation: "03"
          text: "什么事？如果没事的话请不要叫我。"
        - audio: "/spine_assets/kei/audio/kei_04.ogg"
          animation: "99"
          text: "工作要适度，不过偷懒也得适可而止。"
        - audio: "/spine_assets/kei/audio/kei_05.ogg"
          animation: "25"
          text: "刚才笑了吧！？\n绝对是笑了对吧！？\n我可全都看到了！"
      # 复制事件配置（可选，不配置则禁用）
      copyConfig:
        audio: "/spine_assets/kei/audio/kei_copy.ogg" # 可选，不配置则无音频
        animation: "07"
        text: "我能帮上忙吗？"
      # 位置偏移配置（可选，不配置则使用默认位置）
      # offset:
      #   left: "5%"      # 水平位置偏移，支持 % 或 px
      #   bottom: "20px"  # 垂直位置偏移，支持 % 或 px

# 一言/座右铭配置
hitokoto:
  # 是否启用一言
  enable: true
  # 自定义一言列表（为空则使用默认）
  list:
    - "生活不止眼前的苟且，还有诗和远方。"
    - "Stay hungry, stay foolish."
    - "Talk is cheap. Show me the code."
    - "The journey of a thousand miles begins with one step."

# 背景音乐配置
music:
  # 是否启用（需要 features.music 也为 true）
  enable: true
  # 音乐 API 地址，{id} 会被替换为歌曲 ID
  api: "https://www.lihouse.xyz/coco_widget/music_resource/id/{id}"
  # 曲库歌曲 ID 列表（随机播放）
  songIds:
    - 2093257373
    - 2098473565
    - 2098478355
    - 2098473572
    - 2099308172
    - 2099310789
    - 2098477269
    - 2098478097
    - 2630220461
    - 2630217054
  # 音量（0-1，默认 0.3）
  volume: 0.3
  # 音乐 URL 在返回 JSON 中的字段路径，用 . 分隔层级（默认 "song_data.url"）
  urlField: "song_data.url"

# 追番配置
bangumi:
  # 是否启用
  enable: true
  # 页面配置
  page:
    title: "我的追番"
    description: "追番快乐！我收藏的番剧都在这里"
  # 集成配置
  integration:
    vmid: "2" # Bilibili UID
    title: "追番列表"
    lazyload: true
    coverMirror: "" # 图片镜像，解决403问题
    category: [1, 2] # 1=番剧, 2=影视
  # 组件配置
  component:
    categoryFilter: "all" # 'all' | '1' | '2'
    show: 1 # 0=想看, 1=在看, 2=看过
    title: ""
    quote: ""
    darkSelector: "html:not([theme='dark'])"
